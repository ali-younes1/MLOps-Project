apiVersion: apps/v1
kind: Deployment

metadata:
  name: project-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: project

  template:
    metadata:
      labels:
        app: project

    spec:
      containers:
        - name: project
          image: project:v1
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8000
