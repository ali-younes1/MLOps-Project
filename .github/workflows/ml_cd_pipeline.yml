name: ML CD Pipeline for Champion Model API

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  train-and-register:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install training dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training pipeline
        run: |
          python src/train.py

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-outputs
          path: |
            outputs/model.pkl
            outputs/metrics.json
            registry/champion.json

  build-inference-image:
    runs-on: ubuntu-latest
    needs: train-and-register

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download training artifacts
        uses: actions/download-artifact@v4
        with:
          name: training-outputs
          path: .

      - name: Prepare deployment files
        run: |
          python src/prepare_deployment.py

      - name: Show deployment contents
        run: |
          ls -R deployment

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t aliyounes/projectpipeline:latest deployment

      - name: Push Docker image
        run: |
          docker push aliyounes/projectpipeline:latest
